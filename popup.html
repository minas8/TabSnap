<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="extension_name"></title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <style>
      /* =========================
         Base Layout
      ========================= */

      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        inline-size: 400px;
        box-sizing: border-box;
      }

      h1 {
        font-size: 18px;
        margin-block-end: 12px;
      }

      h2 {
        font-size: 16px;
        margin: 0;
      }

      h3 {
        font-size: 14px;
        margin-block: 10px 6px;
      }

      p {
        margin: 0;
      }

      /* =========================
         Buttons
      ========================= */

      button {
        cursor: pointer;
        padding: 8px 12px;
        border: 1px solid #999;
        border-radius: 6px;
        background-color: #f0f0f0;
        font-weight: 600;
        font-size: 13px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Grid for main buttons */

      .main-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-block-end: 12px;
      }

      #confirmSaveSelectedBtn {
        margin-block: 6px 12px;
      }

      /* =========================
         Section Header
      ========================= */

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-block: 16px 8px;
      }

      .section-header button {
        font-size: 12px;
        padding: 6px 10px;
      }

      /* =========================
         Checkbox Area
      ========================= */

      .close-after-save {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-block: 6px 12px;
      }

      .note {
        font-size: 12px;
        line-height: 1.4;
        margin-block-end: 12px;
      }

      /* =========================
         Window Selector
      ========================= */

      .window-selector {
        max-block-size: 200px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 6px;
        border-radius: 6px;
        margin-block-end: 10px;
      }

      .window-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* =========================
         Restore Area
      ========================= */

      .restore-area {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
        margin-block-end: 12px;
      }

      #filePicker {
        display: none;
      }

      /* =========================
         Saved Windows List
      ========================= */

      #savedList {
        margin-block-start: 6px;
      }

      .window-entry {
        background-color: #f7f9fb;
        border-radius: 8px;
        padding: 10px;
        margin-block-end: 10px;
      }

      .window-entry ul {
        margin-block: 6px 0;
        padding-inline-start: 18px;
      }

      .window-entry button {
        border: none;
        background: transparent;
      }

      .window-entry button:hover {
        background-color: #eaeaea;
        border-radius: 6px;
      }

      .window-entry button + button {
        margin-inline-start: 6px;
      }

      .window-entry button {
        margin-block-start: 8px;
      }

      /* =========================
         Icons
      ========================= */

      .material-icons {
        font-size: 18px;
        vertical-align: middle;
      }

      .delete-btn .material-icons {
        color: #c62828;
      }

      .restore-btn .material-icons {
        color: #2e7d32;
      }

      /* =========================
         Messages
      ========================= */

      #messageBox {
        margin-block: 10px;
        font-size: 13px;
      }

      .message {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 6px;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .message .material-icons {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="title_main"></h1>

    <!-- Save Section -->
    <h3 data-i18n="title_save_section"></h3>

    <div class="main-buttons">
      <button
        id="saveCurrentBtn"
        data-action="saveCurrent"
        data-i18n="button_save_active_window"
      ></button>
      <button
        id="saveSelectedBtn"
        data-action="saveSelected"
        data-i18n="button_save_selected_windows"
      ></button>
      <button
        id="saveAllBtn"
        data-action="saveAll"
        data-i18n="button_save_all_windows"
      ></button>
      <!-- <button id="sendSingleByEmailBtn" data-i18n="button_send_window_email"></button> -->
    </div>

    <div class="close-after-save">
      <input type="checkbox" id="closeAfterSaveCheckbox" />
      <label
        for="closeAfterSaveCheckbox"
        data-i18n="checkbox_close_windows_after_save"
      >
      </label>
    </div>

    <div class="note" data-i18n="multiple_windows_comment"></div>

    <div id="windowSelectionArea" style="display: none">
      <h3 data-i18n="title_select_windows"></h3>
      <div class="window-selector" id="windowSelectorList"></div>
      <div class="main-buttons">
        <button
          id="confirmSaveSelectedBtn"
          data-i18n="button_confirm_save"
        ></button>
      </div>
    </div>

    <div id="messageBox"></div>

    <!-- Restore Section -->
    <h3 data-i18n="title_restore_from_file"></h3>

    <div class="restore-area" id="restoreArea">
      <p>
        <span data-i18n="text_drag_drop_hint"></span>
        <a href="#" id="browseLink" data-i18n="button_choose_file"></a>
      </p>
      <input type="file" id="filePicker" accept=".json" />
    </div>

    <!-- Saved Windows Section -->
    <div class="section-header">
      <h2 data-i18n="title_saved_windows"></h2>
      <button
        id="clearLocalBtn"
        data-i18n="button_clear_local_backups"
      ></button>
    </div>

    <div id="savedList"></div>

    <script src="popup.js"></script>
  </body>
</html>
